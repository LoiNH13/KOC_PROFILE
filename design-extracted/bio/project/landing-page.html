<script type="text/babel">
// Each artboard gets its own local page state so you can navigate inside a
// fullscreen focus view. Canvas view shows all 5 pages side by side.
function PageRouter({ lang, initial, t }) {
  const [page, setPage] = React.useState(initial);
  const onNavigate = (p) => setPage(p);

  if (page === 'about') return <AboutPage t={t} lang={lang} onNavigate={onNavigate}/>;
  if (page === 'portfolio') return <PortfolioPage t={t} lang={lang} onNavigate={onNavigate}/>;
  if (page === 'booking') return <BookingPage t={t} lang={lang} onNavigate={onNavigate}/>;
  if (page === 'contact') return <ContactPage t={t} lang={lang} onNavigate={onNavigate}/>;
  if (page === 'mediakit') return <MediaKitPrintPage t={t} lang={lang}/>;
  return <VariationB lang={lang} onNavigate={onNavigate} t={t}/>;
}

function App() {
  const [lang, setLang] = React.useState(() => localStorage.getItem('koc-lang') || 'vi');
  const [dark, setDark] = React.useState(() => localStorage.getItem('koc-dark') === '1');
  React.useEffect(() => { localStorage.setItem('koc-lang', lang); }, [lang]);
  React.useEffect(() => { localStorage.setItem('koc-dark', dark ? '1' : '0'); }, [dark]);
  const t = dark ? TOKENS_B_DARK : TOKENS_B;

  const controls = (
    <div className="no-print" style={{
      position: 'fixed', top: 16, right: 16, zIndex: 200,
      display: 'flex', gap: 8, fontFamily: '"Plus Jakarta Sans", sans-serif',
    }}>
      {/* Dark toggle */}
      <button onClick={() => setDark(!dark)} title={dark ? 'Light mode' : 'Dark mode'} style={{
        width: 40, height: 40, borderRadius: 999, border: 'none', cursor: 'pointer',
        background: dark ? '#2E1834' : 'rgba(255,255,255,0.9)',
        color: dark ? '#FFE07A' : '#2E1A2E',
        boxShadow: '0 4px 16px rgba(0,0,0,0.12)',
        fontSize: 18, display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>{dark ? '☀️' : '🌙'}</button>
      {/* Lang toggle */}
      <div style={{
        display: 'flex', gap: 4, padding: 4,
        background: dark ? '#2E1834' : 'rgba(255,255,255,0.9)', borderRadius: 999,
        boxShadow: '0 4px 16px rgba(0,0,0,0.12)',
      }}>
        {['vi', 'en'].map((l) => (
          <button key={l} onClick={() => setLang(l)} style={{
            padding: '6px 14px', borderRadius: 999, border: 'none', cursor: 'pointer',
            background: lang === l ? (dark ? '#FF78A3' : '#2E1A2E') : 'transparent',
            color: lang === l ? '#fff' : (dark ? '#D4B8C8' : '#6B4A5E'),
            fontSize: 12, fontWeight: 700, letterSpacing: 0.5, textTransform: 'uppercase',
            fontFamily: 'inherit',
          }}>{l}</button>
        ))}
      </div>
    </div>
  );

  return (
    <>
      {controls}
      <DesignCanvas>
        <DCSection id="main" title="Linh Chi · KOC Profile" subtitle="6 pages — click any artboard to focus · nav links switch pages · Esc to exit · toggle 🌙 for dark mode">
          <DCArtboard id="landing" label="01 · Landing" width={1280} height={6800}>
            <PageRouter lang={lang} t={t} initial="landing"/>
          </DCArtboard>
          <DCArtboard id="about" label="02 · About" width={1280} height={2600}>
            <PageRouter lang={lang} t={t} initial="about"/>
          </DCArtboard>
          <DCArtboard id="portfolio" label="03 · Portfolio" width={1280} height={2900}>
            <PageRouter lang={lang} t={t} initial="portfolio"/>
          </DCArtboard>
          <DCArtboard id="booking" label="04 · Booking" width={1280} height={2400}>
            <PageRouter lang={lang} t={t} initial="booking"/>
          </DCArtboard>
          <DCArtboard id="contact" label="05 · Contact" width={1280} height={2400}>
            <PageRouter lang={lang} t={t} initial="contact"/>
          </DCArtboard>
          <DCArtboard id="mediakit" label="06 · Media Kit (A4 print)" width={860} height={1200}>
            <PageRouter lang={lang} t={t} initial="mediakit"/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    </>
  );
}

// ── Global tilt handler: any element with [data-tilt] gets mousemove parallax
(function installTilt() {
  const MAX = 6; // max deg
  const bind = (el) => {
    if (el.__tiltBound) return;
    el.__tiltBound = true;
    el.addEventListener('mousemove', (e) => {
      const r = el.getBoundingClientRect();
      const px = (e.clientX - r.left) / r.width;
      const py = (e.clientY - r.top) / r.height;
      const ry = (px - 0.5) * MAX * 2;
      const rx = -(py - 0.5) * MAX * 2;
      el.style.transform = `perspective(1200px) rotateX(${rx}deg) rotateY(${ry}deg) translateY(-4px)`;
    });
    el.addEventListener('mouseleave', () => {
      el.style.transform = '';
    });
  };
  const scan = () => document.querySelectorAll('[data-tilt]').forEach(bind);
  scan();
  new MutationObserver(scan).observe(document.body, { childList: true, subtree: true });
})();

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
